name: Verify chapter 06

"on":
  push:
    paths:
      - "chapters/06-cost-verification/**"
      - ".github/workflows/verify-chapter-06.yml"
  pull_request:
    paths:
      - "chapters/06-cost-verification/**"
      - ".github/workflows/verify-chapter-06.yml"

permissions:
  contents: read

jobs:
  offline-tests:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: chapters/06-cost-verification/requirements.txt
      - name: Install dependencies
        run: python -m pip install -r chapters/06-cost-verification/requirements.txt
      - name: Syntax check
        working-directory: chapters/06-cost-verification
        run: python -m py_compile main.py providers.py memory.py router.py verifier.py costs.py metrics.py
      - name: Unit tests
        working-directory: chapters/06-cost-verification
        run: python -m unittest discover -s tests -v
      - name: Offline self-test
        working-directory: chapters/06-cost-verification
        run: python main.py --self-test
