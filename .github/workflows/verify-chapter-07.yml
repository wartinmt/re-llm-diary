name: Verify chapter 07

"on":
  push:
    paths:
      - "chapters/07-interrupt-recovery-replay/**"
      - ".github/workflows/verify-chapter-07.yml"
  pull_request:
    paths:
      - "chapters/07-interrupt-recovery-replay/**"
      - ".github/workflows/verify-chapter-07.yml"

permissions:
  contents: read

env:
  PYTHONUTF8: "1"

jobs:
  offline-tests:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: chapters/07-interrupt-recovery-replay/requirements.txt
      - name: Install dependencies
        run: python -m pip install -r chapters/07-interrupt-recovery-replay/requirements.txt
      - name: Syntax check
        working-directory: chapters/07-interrupt-recovery-replay
        run: python -m py_compile main.py journal.py recovery.py providers.py router.py verifier.py costs.py metrics.py memory.py
      - name: Unit tests
        working-directory: chapters/07-interrupt-recovery-replay
        run: python -m unittest discover -s tests -v
      - name: Offline self-test
        working-directory: chapters/07-interrupt-recovery-replay
        run: python main.py --self-test
      - name: Offline recovery demo
        working-directory: chapters/07-interrupt-recovery-replay
        run: python main.py --demo-recovery
